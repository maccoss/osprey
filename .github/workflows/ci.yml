name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev libssl-dev cmake pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openblas openssl cmake
          BREW_PREFIX=$(brew --prefix openblas)
          echo "LDFLAGS=-L${BREW_PREFIX}/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I${BREW_PREFIX}/include" >> $GITHUB_ENV

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install openblas:x64-windows openssl:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --verbose

      - name: Build
        run: cargo build --release

  build-release:
    name: Build Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: osprey
            asset_name: osprey-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: osprey
            asset_name: osprey-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: osprey.exe
            asset_name: osprey-windows-x86_64.exe
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_name: osprey.exe
            asset_name: osprey-windows-aarch64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev libssl-dev cmake pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openblas openssl cmake
          BREW_PREFIX=$(brew --prefix openblas)
          echo "LDFLAGS=-L${BREW_PREFIX}/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I${BREW_PREFIX}/include" >> $GITHUB_ENV

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          $triplet = if ('${{ matrix.target }}' -eq 'aarch64-pc-windows-msvc') { 'arm64-windows' } else { 'x64-windows' }
          vcpkg install openblas:$triplet openssl:$triplet
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          if-no-files-found: error
